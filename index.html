<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login Page</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at top, #10261d 0%, #050505 45%, #020202 100%);
      overflow: hidden;
      color: #fff;
    }

    .bg-glow {
      position: absolute;
      width: 320px;
      height: 320px;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.35;
      animation: float 8s ease-in-out infinite;
    }

    .g1 {
      background: #00ff88;
      top: -60px;
      left: -80px;
    }

    .g2 {
      background: #00b3ff;
      bottom: -70px;
      right: -70px;
      animation-delay: 2s;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px) scale(1); }
      50% { transform: translateY(20px) scale(1.05); }
    }

    .login-box {
      position: relative;
      width: min(92vw, 380px);
      padding: 28px;
      border: 1px solid rgba(0,255,136,0.25);
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(18px);
      border-radius: 24px;
      box-shadow: 0 0 20px rgba(0,255,136,0.18), 0 0 50px rgba(0,194,255,0.12), 0 20px 60px rgba(0,0,0,0.45);
      z-index: 1;
    }

    .login-box::before {
      content: "";
      position: absolute;
      inset: -2px;
      border-radius: 26px;
      padding: 2px;
      background: linear-gradient(135deg, #00ff88, #00c2ff, #00ff88);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      opacity: 0.8;
      pointer-events: none;
      animation: borderMove 4s linear infinite;
    }

    @keyframes borderMove {
      0% { filter: hue-rotate(0deg); }
      100% { filter: hue-rotate(360deg); }
    }

    .title {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 0.95rem;
      color: rgba(255,255,255,0.72);
      margin-bottom: 22px;
    }

    .input-group {
      margin-bottom: 14px;
    }

    .input-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.9rem;
      color: rgba(255,255,255,0.85);
    }

    .input-group input {
      width: 100%;
      padding: 14px 15px;
      border: 1px solid rgba(255,255,255,0.12);
      outline: none;
      border-radius: 14px;
      background: rgba(255,255,255,0.06);
      color: #fff;
      transition: 0.25s ease;
    }

    .input-group input:focus {
      border-color: #00ff88;
      box-shadow: 0 0 0 3px rgba(0,255,136,0.15), 0 0 16px rgba(0,255,136,0.2);
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 10px 0 18px;
      font-size: 0.9rem;
    }

    .row label {
      display: flex;
      align-items: center;
      gap: 8px;
      color: rgba(255,255,255,0.8);
    }

    .row a {
      color: #7effbf;
      text-decoration: none;
    }

    .row a:hover {
      text-decoration: underline;
    }

    .btn {
      width: 100%;
      border: none;
      padding: 14px;
      border-radius: 14px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      color: #04110a;
      background: linear-gradient(90deg, #00ff88, #00c2ff);
      box-shadow: 0 10px 25px rgba(0,255,136,0.18);
      transition: transform 0.2s ease, filter 0.2s ease, box-shadow 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-2px) scale(1.01);
      filter: brightness(1.08);
      box-shadow: 0 0 18px rgba(0,255,136,0.35), 0 0 32px rgba(0,194,255,0.2);
    }

    .btn:active {
      transform: translateY(0) scale(0.99);
    }

    .footer {
      margin-top: 18px;
      text-align: center;
      font-size: 0.92rem;
      color: rgba(255,255,255,0.75);
    }

    .footer a {
      color: #7effbf;
      text-decoration: none;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="bg-glow g1"></div>
  <div class="bg-glow g2"></div>

  <div class="login-box">
    <div class="title">Sign In</div>
    <div class="subtitle">Welcome back. Please enter your account details.</div>

    <form>
      <div class="input-group">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="Enter your username" />
      </div>

      <div class="input-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" />
      </div>

      <div class="row">
        <label><input type="checkbox" /> Remember me</label>
        <a href="#">Forgot password?</a>
      </div>

      <button type="submit" class="btn">Sign In</button>
    </form>

    <div class="footer">
      Don't have an account? <a href="#">Register here</a>
    </div>
  </div>
</body>
</html>
